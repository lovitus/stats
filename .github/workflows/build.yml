name: Build DMG

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode -o /tmp/cert.p12
          security create-keychain -p "build_kc" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build_kc" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "build_kc" build.keychain
          rm /tmp/cert.p12

      - name: Build archive
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -scheme Stats \
            -destination 'platform=OS X,arch=arm64' \
            -configuration Release archive \
            -archivePath $PWD/build/Stats.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain"

      - name: Export .app
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/Stats.xcarchive \
            -exportPath $PWD/build \
            -exportOptionsPlist exportOptions.plist

      - name: Notarize
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          echo "$ASC_PRIVATE_KEY" > /tmp/asc_key.p8
          cd "$GITHUB_WORKSPACE/build"
          ditto -c -k --keepParent Stats.app Stats.zip
          SUBMIT_OUT=$(xcrun notarytool submit Stats.zip \
            --key /tmp/asc_key.p8 \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait --output-format json 2>&1)
          echo "$SUBMIT_OUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])" 2>/dev/null || true)
          STATUS=$(echo "$SUBMIT_OUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])" 2>/dev/null || true)
          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $STATUS"
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --key /tmp/asc_key.p8 \
                --key-id "$ASC_KEY_ID" \
                --issuer "$ASC_ISSUER_ID" || true
            fi
            rm /tmp/asc_key.p8
            exit 1
          fi
          xcrun stapler staple "$GITHUB_WORKSPACE/build/Stats.app"
          rm /tmp/asc_key.p8

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Stats" \
            --window-pos 200 120 \
            --window-size 500 320 \
            --icon-size 80 \
            --icon "Stats.app" 125 175 \
            --hide-extension "Stats.app" \
            --app-drop-link 375 175 \
            --no-internet-enable \
            Stats.dmg \
            "$PWD/build/Stats.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stats-dmg
          path: Stats.dmg
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: "Dev Build (${{ github.sha }})"
          body: "Signed and notarized build from commit ${{ github.sha }}"
          files: Stats.dmg
          prerelease: true
