name: Build DMG

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode -o /tmp/cert.p12
          security create-keychain -p "build_kc" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build_kc" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "build_kc" build.keychain
          rm /tmp/cert.p12

      - name: Build archive
        run: |
          xcodebuild \
            -scheme Stats \
            -destination 'platform=OS X,arch=arm64' \
            -configuration Release archive \
            -archivePath $PWD/build/Stats.xcarchive \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=8WPJLUNLY8

      - name: Export .app
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/Stats.xcarchive \
            -exportPath $PWD/build \
            -exportOptionsPlist exportOptions.plist

      - name: Extract .app from archive
        run: |
          cp -R "$PWD/build/Stats.app" "$PWD/Stats.app" 2>/dev/null || \
          cp -R "$PWD/build/Stats.xcarchive/Products/Applications/Stats.app" "$PWD/Stats.app"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Stats" \
            --window-pos 200 120 \
            --window-size 500 320 \
            --icon-size 80 \
            --icon "Stats.app" 125 175 \
            --hide-extension "Stats.app" \
            --app-drop-link 375 175 \
            --no-internet-enable \
            Stats.dmg \
            "$PWD/Stats.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stats-dmg
          path: Stats.dmg
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: "Dev Build (${{ github.sha }})"
          body: "Automated unsigned build from commit ${{ github.sha }}"
          files: Stats.dmg
          prerelease: true
